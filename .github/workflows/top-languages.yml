name: Generate Top Languages

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: profile-assets-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate top-languages.svg
        uses: lowlighter/metrics@366f8b9dfe3a59656c67d5dcad9950f59c9bc96d # pinned 2026-07-19
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          filename: Assets/top-languages.svg

          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 365

      - name: Commit updated SVG
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "chore: update top-languages.svg [skip ci]"
