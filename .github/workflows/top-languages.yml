name: Update Top Languages

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Languages
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const username = "Dev-Sahad";

            const query = `
            query {
              user(login: "${username}") {
                repositories(first: 100, ownerAffiliations: OWNER) {
                  nodes {
                    languages(first: 10) {
                      edges {
                        size
                        node {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query);
            const repos = result.user.repositories.nodes;

            let langMap = {};
            let total = 0;

            for (const repo of repos) {
              for (const lang of repo.languages.edges) {
                const name = lang.node.name;
                const size = lang.size;

                langMap[name] = (langMap[name] || 0) + size;
                total += size;
              }
            }

            const sorted = Object.entries(langMap)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5);

            let markdown = "## 🧠 Top Languages\n\n";

            for (const [name, size] of sorted) {
              const percent = total ? ((size / total) * 100).toFixed(1) : 0;
              markdown += `- **${name}** — ${percent}%\n`;
            }

            markdown += "\n_Last updated automatically_";

            const file = fs.readFileSync("README.md", "utf8");

            const updated = file.replace(
              /<!--START_LANGUAGES-->[\s\S]*<!--END_LANGUAGES-->/,
              `<!--START_LANGUAGES-->\n${markdown}\n<!--END_LANGUAGES-->`
            );

            fs.writeFileSync("README.md", updated);

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "update languages" || echo "no changes"
          git push
