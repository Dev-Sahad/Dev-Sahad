name: Update Trophies

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ IMPORTANT: clone repo first
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate trophy file
      - name: Download Trophy SVG
        run: |
          curl "https://github-profile-trophy.vercel.app/?username=Dev-Sahad&theme=algolia" -o trophy.svg

      # Commit & push changes
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add trophy.svg
          git commit -m "update trophies" || echo "No changes to commit"
          git push
