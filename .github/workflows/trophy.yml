name: Update GitHub Trophy

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trophy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Custom Dynamic Trophy
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/generate-trophy.js

      - name: Commit and Push Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Assets/trophy.svg
          
          # Only proceed with changes if the output data array differs
          git diff --cached --quiet && exit 0
          
          git commit -m "chore: update GitHub profile metrics trophy [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
          
