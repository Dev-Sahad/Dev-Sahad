name: Update GitHub Trophy

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-assets-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-trophy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js Environment
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Generate Custom Dynamic Trophy
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/generate-trophy.js

      - name: Commit and Push Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Assets/trophy.svg
          
          # Only proceed with changes if the output data array differs
          git diff --cached --quiet && exit 0
          
          git commit -m "chore: update GitHub profile metrics trophy [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
          
