name: Update GitHub Trophy

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trophy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Trophy SVG
        run: |
          mkdir -p Assets
          curl -L "https://github-profile-trophy.vercel.app/?username=Dev-Sahad&theme=algolia&no-frame=true&no-bg=true&margin-w=10" \
          -o Assets/trophy.svg

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Assets/trophy.svg

          git diff --cached --quiet && exit 0

          git commit -m "chore: update GitHub trophy"

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          branch: ${{ github.ref_name }}
