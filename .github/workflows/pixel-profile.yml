name: Pixel Profile Analysis

on:
  push:
    branches: [main, develop]
    paths:
      - Assets/PP.png
      - Assets/pixel-profile.json
      - Assets/pixel-profile.svg
      - scripts/analyze-profile-image.js
      - .github/workflows/pixel-profile.yml
  pull_request:
    branches: [main, develop]
    paths:
      - Assets/PP.png
      - Assets/pixel-profile.json
      - Assets/pixel-profile.svg
      - scripts/analyze-profile-image.js
      - .github/workflows/pixel-profile.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Verify generated pixel profile
        run: node scripts/analyze-profile-image.js --check
