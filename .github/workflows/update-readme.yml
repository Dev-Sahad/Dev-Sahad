name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          
      - name: Update README
        run: |
          node << 'EOF'
          const fs = require('fs');
          const date = new Date().toISOString().split('T')[0];
          let readme = fs.readFileSync('README.md', 'utf8');
          const pattern = /(<strong>Last Updated: <code>)[^<]+(<\/code><\/strong>)/;
          if (!pattern.test(readme)) {
            throw new Error('Last Updated marker was not found in README.md');
          }
          readme = readme.replace(pattern, `$1${date}$2`);
          fs.writeFileSync('README.md', readme);
          console.log('✅ README updated');
          EOF
          
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update profile README [skip ci]" && git push)
