name: Update Profile Assets

on:
  schedule:
    - cron: "0 */12 * * *" # Runs automatically every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Trophy SVG
        run: |
          curl "https://github-profile-trophy.vercel.app/?username=Dev-Sahad&theme=algolia" -o trophy.svg

      - name: Fetch Top Languages SVG
        run: |
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=Dev-Sahad&layout=compact&theme=tokyonight&hide_border=true&langs_count=6" -o top-languages.svg

      - name: Commit and Push Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage both generated assets
          git add trophy.svg top-languages.svg
          
          # Check if either file has actual modifications before making a commit
          if ! git diff --staged --quiet; then
            git commit -m "chore: update profile assets (trophies & languages)"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected in assets."
          fi
          
