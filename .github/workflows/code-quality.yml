name: Code Quality & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Node project exists
        id: check_node
        run: |
          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          else
            echo "node=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check_node.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        if: steps.check_node.outputs.node == 'true'
        run: npm ci

      - name: Run ESLint
        if: steps.check_node.outputs.node == 'true'
        run: npm run lint || echo "No lint script"

      - name: Run tests
        if: steps.check_node.outputs.node == 'true'
        run: npm test || echo "No tests configured"

      - name: Skip message
        if: steps.check_node.outputs.node == 'false'
        run: echo "⚠️ No Node project detected — skipping lint & tests"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Code quality workflow completed successfully!'
            })
