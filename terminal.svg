<svg xmlns="http://www.w3.org/2000/svg" width="720" height="466" viewBox="0 0 720 466" role="img" aria-labelledby="title description">
  <title id="title">Dev-Sahad terminal profile</title>
  <desc id="description">A terminal-style summary of Dev-Sahad's development focus and repository practices.</desc>
  <rect width="720" height="466" rx="16" fill="#020617"/>
  <rect x="1" y="1" width="718" height="464" rx="15" fill="none" stroke="#1e293b"/>
  <style>
    .line { fill: #22c55e; font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: pre; }
  </style>
  <text x="22" y="40" class="line">$ whoami</text>
  <text x="22" y="64" class="line">Dev-Sahad</text>
  <text x="22" y="88" class="line"></text>
  <text x="22" y="112" class="line">$ profile --focus</text>
  <text x="22" y="136" class="line"> Automation · Bots · AI-assisted tools</text>
  <text x="22" y="160" class="line"> Web applications · Community systems</text>
  <text x="22" y="184" class="line"></text>
  <text x="22" y="208" class="line">$ repository --health</text>
  <text x="22" y="232" class="line"> Validation     : automated</text>
  <text x="22" y="256" class="line"> Generated data : reproducible</text>
  <text x="22" y="280" class="line"> Workflows      : least privilege</text>
  <text x="22" y="304" class="line"></text>
  <text x="22" y="328" class="line">$ contact --github</text>
  <text x="22" y="352" class="line"> https://github.com/Dev-Sahad</text>
  <text x="22" y="376" class="line"></text>
  <text x="22" y="400" class="line">$ exit</text>
  <text x="22" y="424" class="line">logout</text>
</svg>
